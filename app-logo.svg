<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0d0d0f"/>
  <defs>
    <linearGradient id="neonCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d500f9"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Coffee Cup -->
  <path d="M256 90 L 256 220 C 256 260, 396 260, 396 220 L 396 90 Z" fill="none" stroke="url(#neonCyan)" stroke-width="24" filter="url(#glow)"/>
  <path d="M396 130 C 440 130, 440 180, 396 180" fill="none" stroke="url(#neonCyan)" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Steam -->
  <path d="M290 40 Q 300 20, 290 0 M 360 40 Q 350 20, 360 0" fill="none" stroke="url(#neonCyan)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>

  <!-- PlayStation Controller -->
  <path d="M120 300 C 10 300, 10 450, 120 450 L 392 450 C 502 450, 502 300, 392 300 Z" fill="none" stroke="url(#neonPurple)" stroke-width="24" filter="url(#glow)"/>
  <circle cx="120" cy="375" r="35" fill="url(#neonPurple)" filter="url(#glow)"/>
  <circle cx="392" cy="375" r="35" fill="url(#neonPurple)" filter="url(#glow)"/>
</svg>
