<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="ريستا كافيه — نظام إدارة كافيه ألعاب احترافي | جلسات، حجوزات، بار، محاسبة، مخزون، بطولات">
  <title>ريستا كافيه — نظام الإدارة</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="app-logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Stations Grid (Dashboard specific) ── */
    .stations-body { padding:14px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media(max-width:768px) { .stations-body { grid-template-columns:1fr; } }

    .station-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-md); padding:14px; cursor:pointer;
      transition:var(--transition);
    }
    .station-item:hover { border-color:rgba(0,229,255,.3); }
    .station-item.active { border-color:rgba(0,230,118,.4); background:rgba(0,230,118,.04); }
    .station-item.idle   { border-color:rgba(255,196,0,.2); }
    .station-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .station-name { font-size:13px; font-weight:700; }
    .station-timer { font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--cyan); line-height:1; margin-bottom:4px; }
    .station-player { font-size:11px; color:var(--muted); }
    .station-revenue { font-size:12px; color:var(--gold); font-weight:600; margin-top:6px; }
    .station-progress { margin-top:10px; height:3px; background:var(--border); border-radius:2px; }
    .station-bar { height:100%; border-radius:2px; transition:width .5s; }
    .bar-active { background:linear-gradient(90deg,var(--cyan),var(--green)); }
    .bar-idle { background:var(--gold); }

    /* ── Alert Items ── */
    .alert-item {
      display:flex; align-items:flex-start; gap:12px;
      padding:12px 16px; border-bottom:1px solid var(--border);
      transition:.2s; cursor:pointer;
    }
    .alert-item:hover { background:rgba(255,255,255,.02); }
    .alert-item:last-child { border-bottom:none; }
    .alert-icon {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .ai-cyan   { background:rgba(0,229,255,.12); }
    .ai-gold   { background:rgba(255,196,0,.12); }
    .ai-green  { background:rgba(0,230,118,.12); }
    .ai-red    { background:rgba(255,23,68,.12); }
    .ai-purple { background:rgba(213,0,249,.12); }
    .alert-content { flex:1; }
    .alert-title { font-size:13px; font-weight:700; margin-bottom:3px; }
    .alert-desc  { font-size:11px; color:var(--muted); line-height:1.5; }
    .alert-time  { font-size:10px; color:var(--muted); margin-top:4px; }

    /* ── Inventory Bars ── */
    .fill-ok   { background:var(--green); }
    .fill-low  { background:var(--gold); }
    .fill-crit { background:var(--red); }

    /* ── Loading Screen ── */
    .loading-screen {
      position:fixed; inset:0; z-index:10000;
      background:var(--bg);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      transition: opacity .5s, visibility .5s;
    }
    .loading-screen.hidden { opacity:0; visibility:hidden; }
    .loading-logo {
      width:80px; height:80px;
      background:linear-gradient(135deg,var(--cyan),var(--purple));
      border-radius:20px; display:flex;
      align-items:center; justify-content:center;
      font-family:var(--font-mono); font-weight:700;
      font-size:32px; color:#000;
      box-shadow:var(--cyan-glow);
      animation: loadPulse 1.5s ease infinite;
      margin-bottom:20px;
    }
    @keyframes loadPulse {
      0%,100% { transform:scale(1); box-shadow:var(--cyan-glow); }
      50% { transform:scale(1.05); box-shadow: 0 0 30px rgba(0,229,255,.5); }
    }
    .loading-text { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .loading-sub { font-size:12px; color:var(--muted); }
    .loading-bar { width:200px; height:3px; background:var(--border); border-radius:2px; margin-top:16px; overflow:hidden; }
    .loading-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--purple)); border-radius:2px; animation: loadBar 1.5s ease forwards; }
    @keyframes loadBar { from { width:0; } to { width:100%; } }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-logo">ر</div>
    <div class="loading-text">ريستا كافيه</div>
    <div class="loading-sub">جاري تحميل النظام...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>

  <!-- Sidebar (Desktop) -->
  <nav class="sidebar"></nav>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav"></nav>

  <!-- More Menu (Mobile) -->
  <div class="more-menu"></div>

  <!-- Main Content -->
  <main class="main">
    <div id="page-content"></div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/bar.js"></script>
  <script src="js/accounting.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/reservations.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/tournaments.js"></script>
  <script src="js/instagram.js"></script>
  <script src="js/settings.js"></script>

  <script>
    // Hide loading screen after everything loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        setTimeout(() => document.getElementById('loading-screen').remove(), 500);
      }, 1500);
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
